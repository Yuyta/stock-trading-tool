services:
  - type: web
    name: trade-algo-pro-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: "*" # 本番ではデプロイ後に Vercel のドメインに制限することを推奨
