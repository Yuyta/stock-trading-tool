services:
  - type: web
    name: trade-algo-pro-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: "*" # 本番デプロイ後は Vercel のドメイン (https://xxx.vercel.app) に限定してください
      - key: DATABASE_URL
        sync: false # Supabase の接続文字列を手動で設定
