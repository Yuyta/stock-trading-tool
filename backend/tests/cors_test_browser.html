<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Verification Tool</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 1.5rem; border-radius: 8px; background: #f9f9f9; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; box-sizing: border-box; }
        button { padding: 0.5rem 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        pre { background: #eee; padding: 1rem; overflow-x: auto; border-radius: 4px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>CORS 動作確認用サンプル</h1>
    <p>ブラウザから実際に API を叩いて CORS が正常に動作するかを確認します。</p>

    <div class="card">
        <label for="apiUrl">API Base URL (例: https://your-api.onrender.com)</label>
        <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="https://xxx.onrender.com">
        
        <button onclick="testCors()">API 接続テスト実行</button>
    </div>

    <h2>実行結果</h2>
    <pre id="output">結果がここに表示されます...</pre>

    <script>
        async function testCors() {
            const baseUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
            const output = document.getElementById('output');
            output.textContent = 'テスト中...';

            try {
                const startTime = Date.now();
                const response = await fetch(`${baseUrl}/api/health`, {
                    method: 'GET',
                    mode: 'cors',
                });
                const duration = Date.now() - startTime;

                if (response.ok) {
                    const data = await response.json();
                    output.innerHTML = `<span class="success">✅ 接続成功！ (Time: ${duration}ms)</span>\n\n` +
                                     `Status: ${response.status} ${response.statusText}\n` +
                                     `Response Body: ${JSON.stringify(data, null, 2)}`;
                } else {
                    output.innerHTML = `<span class="error">❌ 接続エラー (HTTP ${response.status})</span>\n` +
                                     `Status: ${response.status} ${response.statusText}`;
                }
            } catch (err) {
                output.innerHTML = `<span class="error">❌ CORSエラーまたはネットワークエラー</span>\n\n` +
                                 `詳細: ${err.message}\n\n` +
                                 `※ ブラウザのコンソール (F12) を開いて詳細なエラーメッセージを確認してください。\n` +
                                 `※ ブラウザのアドレスバーのドメインと API のドメインが異なる場合、CORS ポリシーによってブロックされます。`;
            }
        }
    </script>
</body>
</html>
