<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="20" fill="#0f172a"></rect>

  <!-- 上昇トレンドライン -->
  <polyline points="10,70 30,50 50,60 70,30 90,40" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>

  <!-- ローソク足（緑） -->
  <line x1="30" y1="65" x2="30" y2="40" stroke="#22c55e" stroke-width="2"></line>
  <rect x="27" y="45" width="6" height="15" fill="#22c55e"></rect>

  <!-- ローソク足（赤） -->
  <line x1="50" y1="70" x2="50" y2="50" stroke="#ef4444" stroke-width="2"></line>
  <rect x="47" y="50" width="6" height="12" fill="#ef4444"></rect>

  <!-- ローソク足（緑） -->
  <line x1="70" y1="55" x2="70" y2="25" stroke="#22c55e" stroke-width="2"></line>
  <rect x="67" y="30" width="6" height="15" fill="#22c55e"></rect>
</svg>